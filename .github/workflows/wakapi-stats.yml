name: Update Wakapi Stats (All Time)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch all-time stats from Wakapi
        id: fetch
        run: |
          # Убираем BOM и сохраняем в файл
          curl -s "https://time.rupu.ru/api/v1/users/Maxim/stats?is_including_today=true" | sed '1s/^\xEF\xBB\xBF//' > stats.json

          # Проверяем что получили (для отладки)
          cat stats.json | head -c 200

          # Извлекаем данные через grep и cut (без jq)
          TOTAL_SEC=$(grep -o '"total_seconds":[0-9]*' stats.json | head -1 | cut -d':' -f2)
          TOTAL_HOURS=$((TOTAL_SEC / 3600))
          TOTAL_MINS=$(( (TOTAL_SEC % 3600) / 60 ))

          # Извлекаем языки (топ-3)
          LANG1=$(grep -A 10 '"languages":' stats.json | grep '"name":"' | head -3 | sed 's/.*"name":"\([^"]*\)".*"hours":\([0-9]*\),"minutes":\([0-9]*\).*/\1: \2h \3m/' | tr '\n' ' | ' | sed 's/ | $//')

          # Сохраняем в переменные
          echo "TOTAL_TIME=${TOTAL_HOURS}h ${TOTAL_MINS}m" >> $GITHUB_ENV
          echo "TOP_LANGS=${LANG1}" >> $GITHUB_ENV
          echo "RAW_JSON<<EOF" >> $GITHUB_ENV
          cat stats.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update README
        run: |
          # Создаём красивый блок со статистикой
          cat > STATS_BLOCK.md << 'EOF'
          ## ⏱️ Coding Activity (All Time)

          | Метрика | Значение |
          |---------|----------|
          | 🕐 **Total time** | **'''${{ env.TOTAL_TIME }}'''** |
          | 📊 **Top languages** | '''${{ env.TOP_LANGS }}''' |

          <details>
          <summary>📈 Подробная статистика (JSON)</summary>

          ```json
          '''${{ env.RAW_JSON }}'''
