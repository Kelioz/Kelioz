name: Update Wakapi Stats

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch stats from Wakapi (last 12 months)
        run: |
          # Запрашиваем максимально доступный период
          curl -s "https://time.rupu.ru/api/v1/users/Maxim/stats?is_including_today=true&range=last_12_months" > stats.json

          # Проверяем, что получили
          echo "=== RESPONSE ==="
          cat stats.json | head -c 500

          # Извлекаем total_seconds (простой grep)
          TOTAL_SEC=$(grep -o '"total_seconds":[0-9]*' stats.json | head -1 | cut -d':' -f2)

          if [ -z "$TOTAL_SEC" ]; then
            echo "TOTAL_SEC not found, using fallback"
            TOTAL_SEC=0
          fi

          TOTAL_HOURS=$((TOTAL_SEC / 3600))
          TOTAL_MINS=$(( (TOTAL_SEC % 3600) / 60 ))

          echo "TOTAL_TIME=${TOTAL_HOURS}h ${TOTAL_MINS}m" >> $GITHUB_ENV

          # Извлекаем топ-3 языка
          LANG_NAMES=$(grep -o '"name":"[^"]*"' stats.json | head -3 | cut -d'"' -f4 | tr '\n' ',' | sed 's/,$//')
          echo "TOP_LANGS=${LANG_NAMES}" >> $GITHUB_ENV

      - name: Update README
        run: |
          cat > STATS_BLOCK.md << EOF
          ## ⏱️ Coding Activity (Last 12 Months)

          | Metric | Value |
          |--------|-------|
          | 🕐 **Total time** | **${{ env.TOTAL_TIME }}** |
          | 📊 **Top languages** | ${{ env.TOP_LANGS }} |

          🔗 **[Live dashboard →](https://time.rupu.ru/u/Maxim)**
          EOF

          # Вставляем блок (убедитесь, что в README есть маркеры <!-- STATS_START --> и <!-- STATS_END -->)
          if grep -q "<!-- STATS_START -->" README.md; then
            sed -i '/<!-- STATS_START -->/,/<!-- STATS_END -->/c\<!-- STATS_START -->\n'"$(cat STATS_BLOCK.md)"'\n<!-- STATS_END -->' README.md
          else
            echo -e "\n<!-- STATS_START -->\n$(cat STATS_BLOCK.md)\n<!-- STATS_END -->" >> README.md
          fi

      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "🤖 Update Wakapi stats (12 months)"
          file_pattern: README.md
